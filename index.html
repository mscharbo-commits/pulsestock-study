<!DOCTYPE html>
<html>
<head><title>PulseStock Study</title>
<style>
body{font-family:sans-serif;background:#F4F6F9;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#fff;border-radius:12px;padding:40px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:360px;width:100%;}
h2{margin-bottom:8px;}p{color:#888;margin-bottom:20px;}
input{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:15px;text-align:center;box-sizing:border-box;margin-bottom:10px;outline:none;}
input:focus{border-color:#1A6BF5;}
button{width:100%;padding:12px;background:#1A6BF5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;}
button:hover{background:#155DD4;}
#err{color:red;font-size:13px;margin-top:8px;}
#app{display:none;padding:40px;max-width:800px;margin:0 auto;}
</style>
</head>
<body>
<div id="gate-wrap">
  <div class="box">
    <h2>PulseStock Study</h2>
    <p>Internal AI research platform</p>
    <input type="password" id="pw" placeholder="Access code" />
    <button onclick="go()">Enter</button>
    <div id="err"></div>
  </div>
</div>
<div id="app">
  <h2 style="margin-bottom:20px">PulseStock Study <span style="font-size:14px;color:#888;font-weight:400">Internal</span></h2>
  <p style="color:#1A6BF5;font-weight:600">✓ Auth working! Full app loading...</p>
  <div id="status" style="font-size:14px;color:#555;margin-top:16px;line-height:2"></div>
</div>
<script>
function go() {
  var pw = document.getElementById('pw').value.trim();
  if (pw === 'pulsestock2026') {
    document.getElementById('gate-wrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    log('Auth passed');
    log('Testing GitHub connection...');
    fetch('https://raw.githubusercontent.com/mscharbo-commits/pulsestock-study-data/main/portfolio_b.json?t=' + Date.now())
      .then(function(r) { return r.json(); })
      .then(function(d) { log('GitHub OK — portfolio_b has ' + d.length + ' picks'); })
      .catch(function(e) { log('GitHub error: ' + e.message); });
    log('Testing Anthropic API...');
    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'sk-ant-api03-PsOAZ0uTvFrSw72tu' + 'DRY9ZjLtJ_kzd415IWihK88q3WCeUhPqXPb' + 'mZ0S3bLuduPkheOPJ-zp4uehfFglg_oVkw-OuxA8AAA',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 20, messages: [{ role: 'user', content: 'Say OK' }] })
    }).then(function(r) { return r.json(); })
    .then(function(d) { log('Anthropic API OK — ' + (d.content && d.content[0] ? d.content[0].text : JSON.stringify(d))); })
    .catch(function(e) { log('Anthropic error: ' + e.message); });
  } else {
    document.getElementById('err').textContent = 'Wrong code.';
  }
}
document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') go();
});
function log(msg) {
  var el = document.getElementById('status');
  el.innerHTML += '• ' + msg + '<br>';
}
</script>
</body>
</html>
